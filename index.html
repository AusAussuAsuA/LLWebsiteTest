<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Pixel Floor</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script>
      AFRAME.registerComponent('dynamic-model', {
        init: function () {
          // 1. Read the web address for a "char" parameter
          const urlParams = new URLSearchParams(window.location.search);
          const characterName = urlParams.get('char');

          // 2. Check the name and change the model source
          if (characterName === 'aussie') {
            this.el.setAttribute('src', './Vince.glb');
          } else if (characterName === 'marq') {
            this.el.setAttribute('src', './Marq.glb');
          } else {
            this.el.setAttribute('src', './Cube.glb'); 
          }
        }
      });
    </script>
  </head>
  
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
  
        <a-gltf-model dynamic-model rotation="90 0 0" scale="0.1 0.1 0.1" animation-mixer></a-gltf-model>
        
      </a-entity>
    </a-scene>
  </body>
</html>
