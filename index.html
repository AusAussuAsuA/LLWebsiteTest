<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 5 0" intensity="0.5"></a-light>

      <a-assets>
        <a-asset-item id="Cube" src="./Cube.glb"></a-asset-item>
        <a-asset-item id="Cube2" src="./Cube2.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box color="red" scale="0.5 0.5 0.5" position="0 0.25 0"></a-box>
        <a-gltf-model src="#Cube" rotation="90 0 0" position="0 0 0" scale="0.1 0.1 0.1" animation-mixer></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-box color="red" scale="0.5 0.5 0.5" position="0 0.25 0"></a-box>
        <a-gltf-model src="#Cube2" rotation="90 0 0" position="0 0 0" scale="0.1 0.1 0.1" animation-mixer></a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
